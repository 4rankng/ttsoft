# Netlify configuration for the Ting Ting Soft landing page (Vite + React + R3F).

[build]
  command = "npm run build"
  publish = "dist"

# SPA rewrite handled by public/_redirects (serves static files first).

# --- Security headers ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# --- Caching ---
# HTML: revalidate often so content updates roll out quickly.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Hashed assets: immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
