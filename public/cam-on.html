<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Cảm ơn bạn — Ting Ting Soft</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    :root {
      color: #101828;
      background: #f7faf9;
      font-family: "Be Vietnam Pro", Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 75% 15%, rgba(20, 184, 166, .13), transparent 35%),
        radial-gradient(circle at 12% 85%, rgba(236, 72, 153, .08), transparent 30%),
        linear-gradient(rgba(16, 24, 40, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 24, 40, .04) 1px, transparent 1px),
        #f7faf9;
      background-size: auto, auto, 60px 60px, 60px 60px;
    }
    .card {
      width: min(620px, calc(100% - 32px));
      padding: 52px;
      border: 1px solid rgba(16, 24, 40, .12);
      border-radius: 28px;
      background: rgba(255, 255, 255, .86);
      box-shadow: 0 30px 90px rgba(16, 24, 40, .12);
      text-align: center;
      backdrop-filter: blur(12px);
    }
    img {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 18px;
      box-shadow: 0 12px 28px rgba(16, 24, 40, .18);
    }
    .eyebrow {
      color: #047857;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }
    h1 {
      margin: 10px 0 16px;
      font-size: clamp(36px, 7vw, 45px);
      line-height: 1.05;
      letter-spacing: -.05em;
    }
    p {
      margin: 0 auto;
      color: #667085;
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      margin-top: 30px;
      padding: 0 20px;
      border-radius: 13px;
      color: white;
      background: linear-gradient(135deg, #047857, #14b8a6);
      font-size: 14px;
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 13px 30px rgba(5, 150, 105, .22);
    }
    @media (max-width: 520px) {
      .card { padding: 38px 24px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/favicon.png" width="64" height="64" alt="">
    <span class="eyebrow">Đã gửi thành công</span>
    <h1>Cảm ơn bạn đã chia sẻ nhu cầu.</h1>
    <p>Ting Ting Soft đã nhận được nhu cầu của bạn. Đội ngũ sẽ xem xét và phản hồi qua email trong 1–2 ngày làm việc — kể cả khi chỉ là một câu hỏi nhỏ.</p>
    <a href="/">Quay lại trang chủ&nbsp; →</a>
  </main>
</body>
</html>
