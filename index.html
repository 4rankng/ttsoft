<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f9fc">
  <meta name="color-scheme" content="light">
  <title>TTSoft — Phần mềm tinh gọn cho doanh nghiệp</title>
  <meta name="description" content="TTSoft thiết kế và phát triển phần mềm theo yêu cầu, tự động hóa, nền tảng dữ liệu và AI giúp doanh nghiệp vận hành tinh gọn và tăng trưởng bền vững.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="vi_VN">
  <meta property="og:title" content="TTSoft — Phần mềm tinh gọn cho doanh nghiệp">
  <meta property="og:description" content="Từ chiến lược sản phẩm đến kiến trúc, phát triển và tối ưu vận hành — một đội ngũ, một quy trình minh bạch.">
  <meta property="og:image" content="/og-image.png">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preload" href="/src/styles.css" as="style">
  <link rel="stylesheet" href="/src/styles.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TTSoft",
    "url": "https://ttsoft.netlify.app/",
    "email": "hello@ttsoft.vn",
    "description": "Thiết kế và phát triển phần mềm theo yêu cầu, tự động hóa, dữ liệu và AI cho doanh nghiệp.",
    "areaServed": "VN"
  }
  </script>
</head>
<body>
  <a class="skip-link" href="#noi-dung">Bỏ qua điều hướng</a>
  <div class="page-progress" aria-hidden="true"><span></span></div>

  <!-- Netlify forms: a hidden static form is required at build time so the
       Netlify post-processing bot can detect the form name "yeu-cau-du-an".
       The visible, React-rendered form in src/components/Contact.tsx mirrors
       these exact field names and submits to the same endpoint. -->
  <form name="yeu-cau-du-an" netlify netlify-honeypot="truong-khong-dien" action="/cam-on.html" method="POST" hidden aria-hidden="true">
    <input type="hidden" name="form-name" value="yeu-cau-du-an">
    <p><label>Không điền trường này: <input name="truong-khong-dien"></label></p>
    <input type="text" name="ho-ten">
    <input type="email" name="email">
    <input type="text" name="doanh-nghiep">
    <input type="tel" name="so-dien-thoai">
    <select name="nhu-cau"><option>Phần mềm theo yêu cầu</option></select>
    <textarea name="mo-ta"></textarea>
    <button type="submit">Gửi</button>
  </form>

  <div id="root"></div>

  <noscript><p class="noscript">Trang vẫn sử dụng được khi tắt JavaScript; hiệu ứng 3D và chuyển động sẽ không hiển thị.</p></noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
