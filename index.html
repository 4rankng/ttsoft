<body>
  <a class="skip-link" href="#noi-dung">Bỏ qua điều hướng</a>
  <div class="page-progress" aria-hidden="true"><span></span></div>

  <!-- Netlify forms: a hidden static form is required at build time so the
       Netlify post-processing bot can detect the form name "yeu-cau-du-an".
       The visible, React-rendered form in src/components/Contact.tsx mirrors
       these exact field names and submits to the same endpoint. -->
  <form name="yeu-cau-du-an" netlify netlify-honeypot="truong-khong-dien" action="/cam-on.html" method="POST" hidden aria-hidden="true">
    <input type="hidden" name="form-name" value="yeu-cau-du-an">
    <p><label>Không điền trường này: <input name="truong-khong-dien"></label></p>
    <input type="text" name="ho-ten">
    <input type="email" name="email">
    <input type="text" name="doanh-nghiep">
    <input type="tel" name="so-dien-thoai">
    <select name="nhu-cau"><option>Phần mềm theo yêu cầu</option></select>
    <textarea name="mo-ta"></textarea>
    <button type="submit">Gửi</button>
  </form>

  <div id="root"></div>
