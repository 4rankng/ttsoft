<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Cảm ơn bạn — TTSoft</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#07172a;background:#f7f9fc}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;background:radial-gradient(circle at 75% 15%,rgba(47,105,255,.13),transparent 35%),linear-gradient(rgba(31,67,109,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(31,67,109,.045) 1px,transparent 1px),#f7f9fc;background-size:auto,60px 60px,60px 60px}.card{width:min(620px,calc(100% - 32px));padding:54px;border:1px solid rgba(20,46,79,.12);border-radius:28px;background:rgba(255,255,255,.86);box-shadow:0 30px 90px rgba(28,61,112,.14);text-align:center}.mark{display:grid;width:60px;height:60px;margin:0 auto 28px;place-items:center;border-radius:18px;color:white;background:linear-gradient(135deg,#2f69ff,#7857ff);font-size:28px}.eyebrow{color:#2f69ff;font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase}h1{margin:10px 0 16px;font-size:45px;line-height:1.05;letter-spacing:-.05em}p{margin:0 auto;color:#627086;line-height:1.7}a{display:inline-flex;min-height:48px;align-items:center;margin-top:30px;padding:0 20px;border-radius:13px;color:white;background:#2f69ff;font-size:14px;font-weight:750;text-decoration:none;box-shadow:0 13px 30px rgba(47,105,255,.23)}@media(max-width:520px){.card{padding:38px 24px}h1{font-size:37px}}
  </style>
</head>
<body><main class="card"><div class="mark">✓</div><span class="eyebrow">Đã gửi thành công</span><h1>Cảm ơn bạn đã liên hệ.</h1><p>TTSoft đã nhận được thông tin dự án. Đội ngũ sẽ xem xét nội dung và phản hồi qua email.</p><a href="/">Quay lại trang chủ&nbsp; →</a></main></body>
</html>
